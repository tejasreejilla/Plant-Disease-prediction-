<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Plant Cultivation & Care Guide</title>
  <link rel="stylesheet" href="../static/css/bootstrap.min.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Tejasree Jilla</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="/guide">Guide</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h2 class="mb-4">Plant Cultivation and Care Guide</h2>
    <table class="table table-striped table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Plant</th>
          <th>Care</th>
          <th>Cultivation</th>
        </tr>
      </thead>
      <tbody>
        {% for plant in plants %}
        <tr>
          <td>{{ plant['Plant'] }}</td>
          <td>{{ plant['Care'] }}</td>
          <td>{{ plant['Cultivation'] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
